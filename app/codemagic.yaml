workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: FishAlarm_ASC_Key   # názov kľúča v Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tvojeemeno.fishalarm   # ← ZMEŇ na svoje
      vars:
        BUNDLE_ID: com.tvojeemeno.fishalarm           # ← ZMEŇ na svoje
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Build iOS release
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Testers
