[common]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; ─── NODE (prútový alarm) — bez BT, len ESP-NOW ─────────────────────
; Pred flashovaním nastav NODE_ID=1..6 pre každý alarm
[env:node1]
extends = common
build_flags = -DNODE_ID=1
build_src_filter = -<*> +<node/>

[env:node2]
extends = common
build_flags = -DNODE_ID=2
build_src_filter = -<*> +<node/>

[env:node3]
extends = common
build_flags = -DNODE_ID=3
build_src_filter = -<*> +<node/>

[env:node4]
extends = common
build_flags = -DNODE_ID=4
build_src_filter = -<*> +<node/>

[env:node5]
extends = common
build_flags = -DNODE_ID=5
build_src_filter = -<*> +<node/>

[env:node6]
extends = common
build_flags = -DNODE_ID=6
build_src_filter = -<*> +<node/>

; ─── RECEIVER (bivak prijímač) — ESP-NOW + BLE + 2× LED ────────────
[env:receiver]
extends = common
build_src_filter = -<*> +<receiver/>
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2
